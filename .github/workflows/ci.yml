name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  offline:
    name: Offline (lint, types, offline tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check foreman tests
      - name: Type-check
        run: mypy foreman
      - name: Offline tests
        # Infra-gated tests skip here (their FOREMAN_TEST_* flags are unset); the
        # integration job below runs them against real services.
        run: pytest -q

  integration:
    name: Integration (real Postgres, Redis, Docker)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: foreman_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # A fresh service-container DB per run is isolated by construction, so the
      # schema-build lock contention seen against a shared dev stack can't occur here
      # (see scratch BACKLOG #16).
      FOREMAN_TEST_POSTGRES: "1"
      FOREMAN_TEST_REDIS: "1"
      FOREMAN_TEST_DOCKER: "1"
      FOREMAN_TEST_POSTGRES_DSN: postgresql://postgres:postgres@localhost:5432/foreman_test
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev,postgres]"
      - name: Infra-gated tests
        # The Docker daemon is preinstalled on GitHub-hosted runners, so the
        # sandbox tests can launch real throwaway containers.
        run: pytest -q -m "requires_postgres or requires_redis or requires_docker"

name: foreman

# Shared infra wiring: point every app service at the in-network services. Provider
# keys come from .env (env_file); these override any infra vars there.
x-app-env: &app-env
  STORE_BACKEND: postgres
  DATABASE_DSN: postgresql://postgres:postgres@postgres:5432/foreman
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  CHROMA_HOST: chroma
  CHROMA_PORT: "8000"

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: foreman
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d foreman"]
      interval: 5s
      timeout: 3s
      retries: 10

  chroma:
    # Match the chromadb client the app installs (v2 API); a 0.5.x server would skew.
    image: chromadb/chroma:1.5.9
    volumes:
      - chroma-data:/chroma/chroma

  # The api service owns the image build; the worker and UIs reuse the same image.
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: foreman-app
    env_file: .env
    environment: *app-env
    ports:
      - "${FOREMAN_API_PORT:-8000}:8000"
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
      chroma: { condition: service_started }
    restart: unless-stopped

  worker:
    image: foreman-app
    command: ["celery", "-A", "foreman.workers.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
    env_file: .env
    environment: *app-env
    # The sandbox launches throwaway containers on the host daemon via this socket.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
      chroma: { condition: service_started }
    restart: unless-stopped

  review-ui:
    image: foreman-app
    command: ["streamlit", "run", "foreman/ui/review.py", "--server.port=8501", "--server.address=0.0.0.0"]
    env_file: .env
    environment: *app-env
    ports:
      - "${FOREMAN_REVIEW_PORT:-8501}:8501"
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  explorer-ui:
    image: foreman-app
    command: ["streamlit", "run", "foreman/ui/explorer.py", "--server.port=8502", "--server.address=0.0.0.0"]
    env_file: .env
    environment: *app-env
    ports:
      - "${FOREMAN_EXPLORER_PORT:-8502}:8502"
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  console-ui:
    image: foreman-app
    command: ["streamlit", "run", "foreman/ui/console.py", "--server.port=8503", "--server.address=0.0.0.0"]
    env_file: .env
    environment:
      <<: *app-env
      # The console is an HTTP client of the api service (reached by name in-network);
      # the review/explorer links are opened by the browser, so they use host ports.
      FOREMAN_API_URL: http://api:8000
      FOREMAN_REVIEW_URL: http://localhost:${FOREMAN_REVIEW_PORT:-8501}
      FOREMAN_EXPLORER_URL: http://localhost:${FOREMAN_EXPLORER_PORT:-8502}
    ports:
      - "${FOREMAN_CONSOLE_PORT:-8503}:8503"
    depends_on:
      api: { condition: service_started }
    restart: unless-stopped

volumes:
  chroma-data:
